<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Cami 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 320px;
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #ff4f81;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 15px;
      background: #ff4f81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff2e6d;
      transform: scale(1.05);
    }

    .heart {
      position: absolute;
      color: #ff4f81;
      font-size: 20px;
      animation: float 4s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hola Cami 🧡</h1>
    <p id="mensaje">Hay algo que quiero recordarte...</p>

    <button onclick="mostrarMensaje()">
      Haz clic aquí ✨
    </button>
  </div>

  <script>
    const mensajes = [
      "Eres una persona increíblemente loca 🌟",
      "eres como el cafe con leche sin azucar, amargo 💫",
      "Nunca olvides que a pesar de que te quede medio cuerpo te querre jajajaja 💖",
      "Gracias por existir, amiguito 🫶",
      "mereces sonreír muchísimo 😄"
    ];

    function mostrarMensaje() {
      const random = Math.floor(Math.random() * mensajes.length);
      document.getElementById("mensaje").innerText = mensajes[random];

      for(let i = 0; i < 10; i++) {
        crearCorazon();
      }
    }

    function crearCorazon() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "🧡";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 15) + "px";
      heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }
  </script>

</body>
</html>
